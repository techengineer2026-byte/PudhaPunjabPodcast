<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Puadha Punjab Podcast</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 100%);
            height: 100vh;
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden; /* Prevents scrollbars during animation */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Glassmorphism Card */
        .thank-you-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        /* Green Glow behind the character */
        .glow-effect {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            background: #1DB954; /* Spotify Green */
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            border-radius: 50%;
        }

        h1 {
            font-weight: 800;
            background: linear-gradient(to right, #fff, #b3b3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p {
            color: #a7a7a7;
            font-weight: 300;
            font-size: 1.1rem;
        }

        .btn-spotify {
            background-color: #1DB954;
            color: black;
            font-weight: 700;
            border-radius: 50px;
            padding: 12px 30px;
            border: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .btn-spotify:hover {
            background-color: #1ed760;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(29, 185, 84, 0.3);
            color: black;
        }

        /* Animation container */
        .lottie-container {
            height: 250px;
            margin-bottom: -20px;
            margin-top: -40px;
        }
    </style>
</head>
<body>

    <!-- Confetti Canvas -->
    <canvas id="confetti" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></canvas>

    <div class="thank-you-card fade-in-up">
        <div class="glow-effect"></div>
        
        <!-- 3D Character Animation (Greeting) -->
        <div class="lottie-container">
            <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
            <lottie-player 
                src="https://lottie.host/9f50e854-3e9a-412f-9c04-98448f88972a/Nl6jE4w0rM.json" 
                background="transparent" 
                speed="1" 
                style="width: 100%; height: 100%;" 
                loop 
                autoplay>
            </lottie-player>
        </div>

        <h1>Sat Sri Akal! 🙏</h1>
        <p class="mb-4">Message received, Paaji/Bhainji!<br>We will get back to you shortly.</p>
        
        <a href="index.html" class="btn btn-spotify">
            Back to Podcast
        </a>
    </div>

    <!-- Confetti Script -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Trigger Confetti on Load
        window.addEventListener('load', () => {
            const duration = 3000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                
                // Blast from left and right
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });
    </script>

</body>
</html>
